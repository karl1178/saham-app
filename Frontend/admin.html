<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel - Saham</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg fixed-top glass-nav">
      <div class="container-fluid px-4">
        <a class="navbar-brand brand-logo m-0" href="dashboard.html"> <i class="fa-solid fa-thumbs-up"></i> Saham Admin </a>
        <a href="dashboard.html" class="btn btn-outline-light btn-sm"><i class="fa-solid fa-arrow-left"></i> Kembali</a>
      </div>
    </nav>

    <div class="container mt-5 pt-5">
      <div class="glass-card p-4">
        <h3 class="mb-4 text-white"><i class="fa-solid fa-database text-primary"></i> Kelola Laporan Keuangan</h3>

        <div class="row mb-4">
          <div class="col-md-6">
            <label class="form-label text-white">Pilih Ticker Saham:</label>
            <select id="tickerSelect" class="form-select form-control-custom">
              <option value="">-- Memuat Ticker... --</option>
            </select>
          </div>
        </div>

        <div class="table-responsive mb-4">
          <table class="table table-dark table-hover table-bordered text-center align-middle">
            <thead>
              <tr class="table-primary">
                <th>Tahun</th>
                <th>Net Income</th>
                <th>Free Cash Flow (FCF)</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="reportTableBody">
              <tr>
                <td colspan="4" class="text-muted">Pilih ticker untuk melihat data.</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="card bg-dark border-secondary p-3">
          <h5 class="text-white mb-3" id="formTitle">Tambah Laporan Baru</h5>
          <form id="reportForm" onsubmit="return false;">
            <input type="hidden" id="editReportId" value="" />
            <div class="row g-3">
              <div class="col-md-4">
                <label class="text-white small">Tahun</label>
                <input type="number" id="inputYear" class="form-control" required />
              </div>
              <div class="col-md-4">
                <label class="text-white small">Net Income</label>
                <input type="number" step="any" id="inputNetIncome" class="form-control" required />
              </div>
              <div class="col-md-4">
                <label class="text-white small">Free Cash Flow</label>
                <input type="number" step="any" id="inputFCF" class="form-control" required />
              </div>
            </div>
            <div class="mt-3">
              <button type="button" id="saveReportBtn" class="btn btn-primary px-4"><i class="fa-solid fa-save"></i> Simpan Data</button>
              <button type="button" id="cancelEditBtn" class="btn btn-secondary d-none">Batal Edit</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="admin.js"></script>
  </body>
</html>
