<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel - Input Laporan Keuangan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-dark text-white">
    <nav class="navbar navbar-expand-lg glass-nav mb-4">
      <div class="container">
        <a class="navbar-brand text-white fw-bold" href="dashboard.html"> <i class="fa-solid fa-arrow-left me-2"></i> Kembali ke Dashboard </a>
      </div>
    </nav>

    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="glass-card p-4 rounded-4 shadow">
            <h3 class="fw-bold mb-4 text-center">
              <i class="fa-solid fa-file-invoice-dollar text-primary me-2"></i>
              Input Data Tahunan
            </h3>

            <form id="adminForm">
              <div class="mb-3">
                <label class="form-label text-muted small fw-bold">TICKER SAHAM</label>
                <select class="form-select bg-dark text-white border-secondary" id="ticker" required>
                  <option value="" disabled selected>Pilih Ticker...</option>
                  <option value="BBCA">BBCA - Bank Central Asia</option>
                  <option value="ASII">ASII - Astra International</option>
                  <option value="ADRO">ADRO - Adaro Energy</option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label text-muted small fw-bold">TAHUN LAPORAN</label>
                <input type="number" class="form-control bg-dark text-white border-secondary" id="year" placeholder="Contoh: 2024" required />
              </div>

              <div class="mb-3">
                <label class="form-label text-muted small fw-bold">NET INCOME (LABA BERSIH) DALAM MILIAR RUPIAH</label>
                <div class="input-group">
                  <span class="input-group-text bg-secondary border-0 text-white">Rp</span>
                  <input type="number" class="form-control bg-dark text-white border-secondary" id="net_income" placeholder="Dalam Miliar" required />
                </div>
              </div>

              <div class="mb-4">
                <label class="form-label text-muted small fw-bold">FREE CASH FLOW (FCF) DALAM MILIAR RUPIAH</label>
                <div class="input-group">
                  <span class="input-group-text bg-secondary border-0 text-white">Rp</span>
                  <input type="number" class="form-control bg-dark text-white border-secondary" id="fcf" placeholder="Dalam Miliar" required />
                </div>
              </div>

              <button type="submit" class="btn btn-primary w-100 py-2 fw-bold"><i class="fa-solid fa-cloud-arrow-up me-2"></i> Simpan ke Database</button>
            </form>

            <div id="statusMessage" class="mt-3 text-center small d-none"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="admin.js"></script>
  </body>
</html>
