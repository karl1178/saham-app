<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Saham</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="forgot-password.css">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-bg-blob"></div>
        <div class="auth-card glass-card text-center" id="forgotCard">
            
            <a href="index.html" class="brand-logo justify-content-center mb-3">
                <i class="fa-solid fa-thumbs-up"></i> Saham
            </a>
            <h2 class="auth-title">Reset Password</h2>
            <p class="auth-subtitle" id="stepDescription">Enter your email to receive a recovery code.</p>

            <form id="forgotForm" novalidate class="text-start">
                
                <!-- Step 1: Email -->
                <div id="stepEmail" class="mb-4">
                    <label for="recoveryEmail" class="form-label">Email Address</label>
                    <input type="email" class="form-control form-control-custom" id="recoveryEmail" placeholder="name@example.com" required>
                    <div class="invalid-feedback" id="recoveryEmailError">Please enter a valid email address.</div>
                </div>

                <!-- Step 2: OTP (Hidden initially) -->
                <div id="stepOTP" class="mb-4 d-none">
                    <label for="otpCode" class="form-label">OTP Code</label>
                    <input type="text" class="form-control form-control-custom text-center py-2 fs-4 letter-spacing-custom" id="otpCode" placeholder="----" maxlength="4">
                    <div class="invalid-feedback" id="otpError">Invalid OTP. Please enter 4 digits.</div>
                </div>

                <!-- Step 3: New Password (Hidden initially) -->
                <div id="stepNewPwd" class="d-none">
                    <div class="mb-3">
                        <label for="newPassword" class="form-label">New Password</label>
                        <input type="password" class="form-control form-control-custom" id="newPassword" placeholder="Must be at least 8 characters">
                    </div>
                    <div class="mb-4">
                        <label for="confirmPassword" class="form-label">Confirm New Password</label>
                        <input type="password" class="form-control form-control-custom" id="confirmPassword" placeholder="Re-enter new password">
                        <div class="invalid-feedback" id="pwdMatchError">Passwords do not match or are identical to old password!</div>
                    </div>
                </div>

                <button type="submit" class="btn btn-custom-primary w-100 py-2 mb-4" id="submitBtn">Send OTP</button>

                <div class="text-center">
                    <a href="login.html" class="link-custom" style="font-size: 0.9rem;">
                        <i class="fa fa-arrow-left me-1"></i> Back to Log In
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
    <script src="forgot-password.js"></script>
</body>
</html>
