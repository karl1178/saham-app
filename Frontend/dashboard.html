<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Saham</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg fixed-top glass-nav">
      <div class="container-fluid px-4">
        <a class="navbar-brand brand-logo m-0" href="dashboard.html">
          <i class="fa-solid fa-thumbs-up"></i>
        </a>

        <div class="mx-auto search-container d-none d-lg-block w-50" style="max-width: 500px">
          <div class="input-group">
            <span class="input-group-text search-icon-bg border-0">
              <i class="fa fa-search text-muted"></i>
            </span>
            <input type="text" id="desktopSearch" class="form-control search-input border-0" placeholder="Search symbol or company name..." />
          </div>
        </div>

        <div class="d-flex align-items-center gap-3">
          <a href="admin.html" id="adminLink" class="text-white text-decoration-none btn btn-outline-secondary btn-sm rounded-pill px-3 d-none"> <i class="fa-solid fa-user-gear me-1"></i> Admin </a>

          <a href="index.html" class="logout-btn fs-4" title="Logout">
            <i class="fa-solid fa-arrow-right-from-bracket text-danger"></i>
          </a>
        </div>
      </div>
    </nav>

    <div class="container-fluid mt-5 pt-4 d-block d-lg-none">
      <div class="input-group mx-auto">
        <span class="input-group-text search-icon-bg border-0">
          <i class="fa fa-search text-muted"></i>
        </span>
        <input type="text" id="mobileSearch" class="form-control search-input border-0" placeholder="Search..." />
      </div>
    </div>

    <div class="container mt-5 pt-3 pb-5">
      <div class="text-decoration-none d-block mb-4 top-fav-card p-4 rounded-4 glass-card">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="d-flex align-items-center gap-3">
            <div
              class="stock-icon m-0 bg-primary bg-opacity-25 text-primary"
              style="width: 54px; height: 54px; font-size: 1.6rem; border: 1px solid rgba(13, 110, 253, 0.5); display: flex; align-items: center; justify-content: center; border-radius: 12px"
            >
              <i class="fa-solid fa-chart-line"></i>
            </div>
            <div>
              <h4 class="mb-0 fw-bold d-flex align-items-center gap-2 text-white">IHSG <span class="fs-6 text-muted fw-normal">Composite</span></h4>
              <p class="mb-0 text-muted small">Indeks Harga Saham Gabungan (JKSE)</p>
            </div>
          </div>
          <div class="text-end">
            <div class="fs-2 fw-bold text-white" id="ihsgPrice">0.00</div>
            <span class="badge fs-6" id="ihsgChange">0.00 (0.00%)</span>
          </div>
        </div>

        <div class="d-flex justify-content-end gap-2 mb-3 mt-2">
          <button class="btn btn-sm text-primary fw-bold chart-filter-btn" data-range="1d">1D</button>
          <button class="btn btn-sm text-muted chart-filter-btn" data-range="1w">1W</button>
          <button class="btn btn-sm text-muted chart-filter-btn" data-range="1m">1M</button>
          <button class="btn btn-sm text-muted chart-filter-btn" data-range="3m">3M</button>
          <button class="btn btn-sm text-muted chart-filter-btn" data-range="1y">1Y</button>
          <button class="btn btn-sm text-muted chart-filter-btn" data-range="5y">5Y</button>
          <button class="btn btn-sm text-muted chart-filter-btn" data-range="all">ALL</button>
        </div>
        <div class="chart-container" style="height: 250px; position: relative">
          <canvas id="ihsgMainChart"></canvas>
        </div>
      </div>

      <div class="mb-4">
        <div class="d-flex justify-content-between align-items-center border-bottom border-secondary pb-2 mb-3">
          <h5 class="fw-bold mb-0">Trending Stocks</h5>
          <span class="text-muted small">Real-time Analysis</span>
        </div>
        <div class="stock-list" id="stockListContainer"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="storage.js"></script>
    <script src="script.js"></script>
    <script src="dashboard.js"></script>
  </body>
</html>
