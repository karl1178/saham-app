<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Saham</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="register.css" />
    <style>
      .letter-spacing-custom {
        letter-spacing: 0.5rem;
      }
      #sendOtpBtn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      #otpWrapper {
        transition: all 0.3s ease;
      }
      /* Tambahan agar input OTP terlihat jelas saat muncul */
      .show-otp {
        display: block !important;
      }
    </style>
  </head>
  <body>
    <div class="auth-wrapper py-5">
      <div class="auth-bg-blob"></div>
      <div class="auth-card glass-card">
        <div class="text-center mb-4">
          <a href="index.html" class="brand-logo justify-content-center mb-3 text-decoration-none"> <i class="fa-solid fa-thumbs-up"></i> Saham </a>
          <h2 class="auth-title">Create an Account</h2>
          <p class="auth-subtitle">Join us and start your investment journey.</p>
        </div>

        <form id="registerForm" onsubmit="return false;" novalidate>
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control form-control-custom" id="username" placeholder="john_doe" required />
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" class="form-control form-control-custom" id="email" placeholder="name@example.com" required />
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control form-control-custom" id="password" placeholder="Min. 6 characters" required />
          </div>

          <div class="mb-4">
            <label for="confirmPassword" class="form-label">Confirm Password</label>
            <input type="password" class="form-control form-control-custom" id="confirmPassword" placeholder="Match your password" required />
          </div>

          <div class="mb-4 text-center">
            <p class="text-muted small mb-2" id="otpHelpText">Lengkapi data di atas untuk mengirim OTP.</p>

            <button type="button" class="btn btn-custom-outline w-100 mb-3" id="sendOtpBtn" disabled>Send OTP to Email</button>

            <div id="otpWrapper" class="collapse mt-3">
              <label for="otpCode" class="form-label text-start d-block fw-bold">Enter 6-Digit OTP</label>
              <input type="text" class="form-control form-control-custom text-center letter-spacing-custom fs-4 py-2 mb-2" id="otpCode" placeholder="------" maxlength="6" />
              <small class="text-info">Cek Inbox atau folder Spam email Anda.</small>
            </div>
          </div>

          <button type="button" class="btn btn-custom-primary w-100 py-2 mb-4" id="registerBtn" disabled>Sign Up & Verify</button>

          <div class="text-center">
            <p class="text-muted mb-0" style="font-size: 0.9rem">Sudah punya akun? <a href="login.html" class="link-custom fw-semibold">Log In di sini</a></p>
          </div>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="register.js"></script>
    <script src="script.js"></script>
  </body>
</html>
