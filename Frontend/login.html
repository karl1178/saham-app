<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Saham</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <div class="auth-wrapper">
        <div class="auth-bg-blob"></div>
        <div class="auth-card glass-card">

            <div class="text-center mb-4">
                <a href="index.html" class="brand-logo justify-content-center mb-3">
                    <i class="fa-solid fa-thumbs-up"></i> Saham
                </a>
                <h2 class="auth-title">Welcome Back</h2>
                <p class="auth-subtitle">Log in to track your investments</p>
            </div>

            <form id="loginForm" novalidate>
                <!-- Email Input -->
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control form-control-custom" id="email"
                        placeholder="name@example.com" required>
                    <div class="invalid-feedback" id="emailError">
                        Please enter a valid email address.
                    </div>
                </div>

                <!-- Password Input -->
                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control form-control-custom" id="password"
                        placeholder="Enter your password" required>
                    <div class="invalid-feedback" id="passwordError">
                        Password cannot be empty.
                    </div>
                </div>

                <!-- Actions -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe"
                            style="background-color: var(--glass-bg); border-color: rgba(255,255,255,0.2);">
                        <label class="form-check-label text-muted" for="rememberMe" style="font-size: 0.85rem;">
                            Remember me
                        </label>
                    </div>
                    <a href="forgot-password.html" class="link-custom" style="font-size: 0.85rem;">Lupa Password?</a>
                </div>

                <button type="submit" class="btn btn-custom-primary w-100 py-2 mb-4">Log In to Account</button>

                <div class="text-center">
                    <p class="text-muted mb-0" style="font-size: 0.9rem;">
                        Belum punya akun? <a href="register.html" class="link-custom fw-semibold">Daftar di sini</a>
                    </p>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
    <script src="login.js"></script>
</body>

</html>
